<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAC 自我狀態量表</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: #f5f4f0;
  color: #1a1a18;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}

.screen { display: none; width: 100%; max-width: 560px; }
.screen.active { display: block; }

/* ── INTRO ── */
.intro-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e0ded7;
  padding: 2.5rem 2rem;
  text-align: center;
}
.intro-badge {
  display: inline-block;
  background: #EEEDFE;
  color: #3C3489;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 1.25rem;
}
.intro-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 0.75rem; }
.intro-card .lead { font-size: 14px; color: #5f5e5a; line-height: 1.75; margin-bottom: 1.5rem; }
.intro-rules {
  background: #f5f4f0;
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 2rem;
  text-align: left;
}
.intro-rules p { font-size: 13px; color: #444441; line-height: 1.9; margin: 0; }
.option-demo { display: flex; gap: 8px; justify-content: center; margin-bottom: 2rem; }
.demo-btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; }
.demo-yes    { background: #1D9E75; color: #fff; }
.demo-unsure { background: #BA7517; color: #fff; }
.demo-no     { background: #D85A30; color: #fff; }

/* ── QUESTION ── */
.q-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e0ded7;
  padding: 2rem 2rem 2.5rem;
}
.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.75rem;
}
.q-counter { font-size: 13px; color: #888780; font-weight: 500; flex-shrink: 0; }
.q-progress-wrap {
  flex: 1;
  margin: 0 1rem;
  height: 4px;
  background: #e0ded7;
  border-radius: 2px;
  overflow: hidden;
}
.q-progress-fill {
  height: 100%;
  background: #534AB7;
  border-radius: 2px;
  transition: width 0.35s ease;
}
.q-back {
  background: none;
  border: none;
  cursor: pointer;
  color: #888780;
  font-size: 13px;
  padding: 4px 0;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  min-width: 52px;
}
.q-back:hover { color: #1a1a18; }

.q-num-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: #888780;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.q-text {
  font-size: 18px;
  font-weight: 500;
  line-height: 1.65;
  margin-bottom: 2.25rem;
  min-height: 58px;
}

.q-choices { display: flex; flex-direction: row; gap: 12px; }
.choice-btn {
  flex: 1;
  padding: 18px 10px;
  border-radius: 10px;
  border: 1.5px solid #e0ded7;
  background: #fff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  color: #1a1a18;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.choice-btn:hover { border-color: #b4b2a9; background: #f9f8f5; }
.choice-btn:active { transform: scale(0.985); }
.choice-btn.sel-yes    { border-color: #1D9E75; background: #E1F5EE; color: #085041; }
.choice-btn.sel-unsure { border-color: #BA7517; background: #FAEEDA; color: #412402; }
.choice-btn.sel-no     { border-color: #D85A30; background: #FAECE7; color: #4A1B0C; }

.choice-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid #d3d1c7;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.sel-yes    .choice-dot { background: #1D9E75; border-color: #1D9E75; }
.sel-unsure .choice-dot { background: #BA7517; border-color: #BA7517; }
.sel-no     .choice-dot { background: #D85A30; border-color: #D85A30; }
.dot-inner {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #fff;
  opacity: 0;
  transition: opacity 0.15s;
}
.sel-yes .dot-inner, .sel-unsure .dot-inner, .sel-no .dot-inner { opacity: 1; }

/* ── RESULT ── */
.result-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e0ded7;
  padding: 2rem 2rem 2.5rem;
}
.result-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.result-sub { font-size: 13px; color: #5f5e5a; margin-bottom: 1.75rem; }

.score-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 1.75rem;
}
.score-tile {
  background: #f5f4f0;
  border-radius: 10px;
  padding: 12px 6px;
  text-align: center;
}
.tile-cat  { font-size: 11px; color: #888780; margin-bottom: 4px; font-weight: 600; }
.tile-num  { font-size: 24px; font-weight: 700; }
.tile-bar-bg   { height: 3px; background: #e0ded7; border-radius: 2px; margin-top: 7px; }
.tile-bar-fill { height: 3px; border-radius: 2px; }

.chart-box { position: relative; height: 260px; margin-bottom: 1.25rem; }

.result-legend {
  display: flex; flex-wrap: wrap;
  gap: 8px 18px;
  font-size: 12px; color: #5f5e5a;
  margin-bottom: 1.75rem;
}
.leg-row { display: flex; align-items: center; gap: 5px; }
.leg-sq  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ── SHARED BUTTONS ── */
.btn-primary {
  display: block; width: 100%;
  padding: 14px;
  background: #534AB7; color: #fff;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  text-align: center;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.88; }
.btn-ghost {
  display: block; width: 100%;
  margin-top: 10px; padding: 13px;
  background: transparent; color: #5f5e5a;
  border: 1.5px solid #d3d1c7; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  text-align: center;
  transition: background 0.15s;
}
.btn-ghost:hover { background: #f1efe8; }

@media (max-width: 420px) {
  body { padding: 1rem 0.75rem; align-items: flex-start; padding-top: 1.5rem; }
  .intro-card, .q-card, .result-card { padding: 1.5rem 1.25rem 2rem; }
  .q-text { font-size: 16px; }
  .tile-num { font-size: 20px; }
}
</style>
</head>
<body>

<!-- 介紹頁 -->
<div class="screen active" id="screen-intro">
  <div class="intro-card">
    <div class="intro-badge">PAC 人格結構分析</div>
    <h1>自我狀態量表</h1>
    <p class="lead">本量表共 50 題，用來了解你在日常生活中常用的自我狀態，<br>幫助你更認識自己的溝通風格與人格特質。</p>
    <div class="intro-rules">
      <p>
        每題請依照<strong>自己的實際情形</strong>作答，沒有對錯之分。<br>
        每題有三個選項：<br><br>
        &nbsp;・&nbsp;<strong>是</strong> ─ 很像你<br>
        &nbsp;・&nbsp;<strong>不確定</strong><br>
        &nbsp;・&nbsp;<strong>否</strong> ─ 不像你
      </p>
    </div>
    <div class="option-demo">
      <span class="demo-btn demo-yes">是</span>
      <span class="demo-btn demo-unsure">不確定</span>
      <span class="demo-btn demo-no">否</span>
    </div>
    <button class="btn-primary" onclick="startQuiz()">開始作答</button>
  </div>
</div>

<!-- 作答頁 -->
<div class="screen" id="screen-question">
  <div class="q-card">
    <div class="q-header">
      <button class="q-back" id="backBtn" onclick="prevQuestion()">&#8592; 上一題</button>
      <div class="q-progress-wrap">
        <div class="q-progress-fill" id="qProg"></div>
      </div>
      <span class="q-counter" id="qCounter">1 / 50</span>
    </div>
    <div class="q-num-label" id="qNumLabel">第 1 題</div>
    <div class="q-text" id="qText"></div>
    <div class="q-choices">
      <button class="choice-btn" id="btn-yes" onclick="answer(2)">
        <span class="choice-dot"><span class="dot-inner"></span></span>是
      </button>
      <button class="choice-btn" id="btn-unsure" onclick="answer(1)">
        <span class="choice-dot"><span class="dot-inner"></span></span>不確定
      </button>
      <button class="choice-btn" id="btn-no" onclick="answer(0)">
        <span class="choice-dot"><span class="dot-inner"></span></span>否
      </button>
    </div>
  </div>
</div>

<!-- 結果頁 -->
<div class="screen" id="screen-result">
  <div class="result-card">
    <h2>你的 PAC 剖面圖</h2>
    <p class="result-sub">以下是你五個自我狀態的得分（每類滿分 20 分）</p>
    <div class="score-grid" id="scoreGrid"></div>
    <div class="chart-box">
      <canvas id="pacChart" role="img" aria-label="PAC剖面長條圖，顯示CP、NP、A、FC、AC五類得分"></canvas>
    </div>
    <div class="result-legend" id="resultLegend"></div>
    <button class="btn-ghost" onclick="showIntro()">重新作答</button>
  </div>
</div>

<script>
const questions = [
  {n:1,  t:"我總是很快的就能發現別人的缺點", c:"CP"},
  {n:2,  t:"朋友覺得我很能體貼別人", c:"NP"},
  {n:3,  t:"朋友說我很理性", c:"A"},
  {n:4,  t:"我喜歡隨心所欲、有點任性的過生活", c:"FC"},
  {n:5,  t:"我很害怕且會盡量避免衝突的場面", c:"AC"},
  {n:6,  t:"我對己對人都嚴格，而且喜歡教導別人", c:"CP"},
  {n:7,  t:"朋友說我很溫暖", c:"NP"},
  {n:8,  t:"我和別人說話時多半訴諸理性", c:"A"},
  {n:9,  t:"我對很多事情都很好奇", c:"FC"},
  {n:10, t:"朋友說我很隨和、好說話", c:"AC"},
  {n:11, t:"我經常發表對各種人事物的評論", c:"CP"},
  {n:12, t:"我會稱讚別人的優點", c:"NP"},
  {n:13, t:"我會仔細分析、慎重考慮後再做決定", c:"A"},
  {n:14, t:"我是那種情緒藏不住、全都寫在臉上的人", c:"FC"},
  {n:15, t:"我常覺得自己的意見不重要，大家開心就好", c:"AC"},
  {n:16, t:"我會努力實現我的理想", c:"CP"},
  {n:17, t:"對於別人的請託，我多半不會覺得厭煩", c:"NP"},
  {n:18, t:"我會蒐集很多資料做為參考", c:"A"},
  {n:19, t:"我不喜歡拐彎抹角的說話", c:"FC"},
  {n:20, t:"我通常是和別人妥協，不會要求別人接受我的意見", c:"AC"},
  {n:21, t:"我重視社會規範和倫理道德", c:"CP"},
  {n:22, t:"我喜歡照顧別人，對小孩更是", c:"NP"},
  {n:23, t:"我會以事實作為判斷各種人事物的依據", c:"A"},
  {n:24, t:"我的情緒說來就來、說去就去，變化很快", c:"FC"},
  {n:25, t:"我對別人的臉色和眼光很敏感", c:"AC"},
  {n:26, t:"我會要求別人要有責任感，我討厭做事散漫的人", c:"CP"},
  {n:27, t:"別人難過時，我會設法讓他好受一點", c:"NP"},
  {n:28, t:"我認為保持客觀是一件重要的事", c:"A"},
  {n:29, t:"我常說「好棒、哇、咦」等感嘆詞", c:"FC"},
  {n:30, t:"我常回應別人「好吧、隨便」", c:"AC"},
  {n:31, t:"朋友說和我在一起很緊張，因為會擔心講錯話或做錯事", c:"CP"},
  {n:32, t:"我能夠包容別人的錯誤", c:"NP"},
  {n:33, t:"我會衡量利害得失後才採取行動", c:"A"},
  {n:34, t:"我常以直覺判斷事情，坦率的說一些話、做一些事", c:"FC"},
  {n:35, t:"我會努力達到別人對我的期望", c:"AC"},
  {n:36, t:"我會以嚴格的態度指責不當的言語和行為", c:"CP"},
  {n:37, t:"我會專注傾聽別人說話，並且會點頭表示了解", c:"NP"},
  {n:38, t:"我做事情都很有計畫", c:"A"},
  {n:39, t:"我可以很自由的表達感情", c:"FC"},
  {n:40, t:"我總覺得自己想說的話很難說出口", c:"AC"},
  {n:41, t:"我認為在要求權力之前，應該要先盡到義務", c:"CP"},
  {n:42, t:"我很重視人際關係和人情味", c:"NP"},
  {n:43, t:"我能有效率的處理事情", c:"A"},
  {n:44, t:"我說話和做事有點衝動，不會想太多", c:"FC"},
  {n:45, t:"我常擔心自己做的不夠好", c:"AC"},
  {n:46, t:"我經常說「應該」怎樣…、「最好」怎樣…之類的話", c:"CP"},
  {n:47, t:"我樂意為人服務和參加公益活動", c:"NP"},
  {n:48, t:"我不喜歡不明確的情況，和不確定的事情", c:"A"},
  {n:49, t:"我喜歡冒險，做一些自己沒做過的事", c:"FC"},
  {n:50, t:"我做事常會考慮別人的感覺", c:"AC"}
];

const cats = ["CP","NP","A","FC","AC"];
const catColors = {CP:"#534AB7", NP:"#1D9E75", A:"#378ADD", FC:"#BA7517", AC:"#D85A30"};
const catDesc   = {CP:"控制型父母", NP:"養育型父母", A:"成人", FC:"自由型兒童", AC:"順應型兒童"};

let current = 0;
let answers = new Array(50).fill(null);
let chartInst = null;

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showIntro() {
  current = 0;
  answers = new Array(50).fill(null);
  show("screen-intro");
}

function startQuiz() {
  current = 0;
  renderQuestion();
  show("screen-question");
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById("qProg").style.width = Math.round(current / 50 * 100) + "%";
  document.getElementById("qCounter").textContent = (current + 1) + " / 50";
  document.getElementById("qNumLabel").textContent = "第 " + (current + 1) + " 題";
  document.getElementById("qText").textContent = q.t;
  document.getElementById("backBtn").style.visibility = current === 0 ? "hidden" : "visible";

  const saved = answers[current];
  document.getElementById("btn-yes").className    = "choice-btn" + (saved === 2 ? " sel-yes" : "");
  document.getElementById("btn-unsure").className = "choice-btn" + (saved === 1 ? " sel-unsure" : "");
  document.getElementById("btn-no").className     = "choice-btn" + (saved === 0 ? " sel-no" : "");
}

function answer(val) {
  answers[current] = val;
  document.getElementById("btn-yes").className    = "choice-btn" + (val === 2 ? " sel-yes" : "");
  document.getElementById("btn-unsure").className = "choice-btn" + (val === 1 ? " sel-unsure" : "");
  document.getElementById("btn-no").className     = "choice-btn" + (val === 0 ? " sel-no" : "");

  setTimeout(() => {
    if (current < 49) { current++; renderQuestion(); }
    else { showResult(); }
  }, 300);
}

function prevQuestion() {
  if (current > 0) { current--; renderQuestion(); }
}

function calcScores() {
  const s = {CP:0, NP:0, A:0, FC:0, AC:0};
  questions.forEach((q, i) => { if (answers[i] !== null) s[q.c] += answers[i]; });
  return s;
}

function showResult() {
  const s = calcScores();

  const grid = document.getElementById("scoreGrid");
  grid.innerHTML = "";
  cats.forEach(cat => {
    const tile = document.createElement("div");
    tile.className = "score-tile";
    tile.innerHTML =
      `<div class="tile-cat">${cat}</div>` +
      `<div class="tile-num" style="color:${catColors[cat]}">${s[cat]}</div>` +
      `<div class="tile-bar-bg"><div class="tile-bar-fill" style="width:${Math.round(s[cat]/20*100)}%;background:${catColors[cat]}"></div></div>`;
    grid.appendChild(tile);
  });

  const leg = document.getElementById("resultLegend");
  leg.innerHTML = "";
  cats.forEach(cat => {
    const row = document.createElement("div");
    row.className = "leg-row";
    row.innerHTML = `<span class="leg-sq" style="background:${catColors[cat]}"></span>${cat}（${catDesc[cat]}）`;
    leg.appendChild(row);
  });

  if (chartInst) { chartInst.destroy(); }
  chartInst = new Chart(document.getElementById("pacChart").getContext("2d"), {
    type: "line",
    data: {
      labels: cats,
      datasets: [{
        data: cats.map(c => s[c]),
        backgroundColor: "rgba(83,74,183,0.08)",
        borderColor: "#534AB7",
        borderWidth: 2.5,
        pointBackgroundColor: cats.map(c => catColors[c]),
        pointBorderColor: cats.map(c => catColors[c]),
        pointRadius: 7,
        pointHoverRadius: 9,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `得分：${ctx.raw} / 20` } }
      },
      scales: {
        y: { min: 0, max: 20, ticks: { stepSize: 4, font: { size: 12 } }, grid: { color: "rgba(0,0,0,0.07)" } },
        x: { ticks: { font: { size: 15, weight: "600" } }, grid: { display: false } }
      }
    }
  });

  show("screen-result");
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
</body>
</html>
